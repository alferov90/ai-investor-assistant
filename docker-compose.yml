services:
  postgres:
    image: postgres:16-alpine
    container_name: investor-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-investor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-investor}
      POSTGRES_DB: ${POSTGRES_DB:-investor}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-investor} -d ${POSTGRES_DB:-investor}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: investor-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  telegram-proxy:
    image: python:3.12-slim
    container_name: investor-telegram-proxy
    network_mode: host
    environment:
      LISTEN_HOST: 172.19.0.1
      LISTEN_PORT: 8888
    volumes:
      - ./scripts/telegram_connect_proxy.py:/proxy.py:ro
    command: ["python", "/proxy.py"]
    restart: unless-stopped

  api:
    build: .
    container_name: investor-api
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-investor}:${POSTGRES_PASSWORD:-investor}@postgres:5432/${POSTGRES_DB:-investor}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      STOCK_CACHE_TTL_SECONDS: ${STOCK_CACHE_TTL_SECONDS:-300}
      TWELVE_DATA_API_KEY: ${TWELVE_DATA_API_KEY:-}
      YAHOO_PROXY_URL: ${YAHOO_PROXY_URL:-}
      YAHOO_FETCH_TIMEOUT_SECONDS: ${YAHOO_FETCH_TIMEOUT_SECONDS:-10}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      telegram-proxy:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres-data:
  redis-data:
