<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — AI Investor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <nav class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="/dashboard" class="font-semibold text-lg"><span class="text-emerald-400">AI</span> Investor</a>
      <div class="flex items-center gap-4 text-sm">
        <a href="/dashboard" class="text-emerald-400">Dashboard</a>
        <a href="/portfolio" class="text-slate-300 hover:text-white">Портфель</a>
        <a href="/analysis" class="text-slate-300 hover:text-white">Анализ</a>
        <button onclick="logout()" class="text-slate-400 hover:text-white">Выйти</button>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div class="mb-8">
      <h1 class="text-2xl font-bold">Dashboard</h1>
      <p id="welcome" class="text-slate-400 mt-1">Загрузка...</p>
    </div>

    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
        <p class="text-slate-400 text-sm">Стоимость портфеля</p>
        <p id="total-value" class="text-2xl font-bold mt-1">—</p>
      </div>
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
        <p class="text-slate-400 text-sm">Инвестировано</p>
        <p id="total-cost" class="text-2xl font-bold mt-1">—</p>
      </div>
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
        <p class="text-slate-400 text-sm">P/L</p>
        <p id="total-pnl" class="text-2xl font-bold mt-1">—</p>
      </div>
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
        <p class="text-slate-400 text-sm">Позиций</p>
        <p id="holdings-count" class="text-2xl font-bold mt-1">—</p>
      </div>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-xl p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-semibold text-lg">Топ позиций</h2>
        <a href="/portfolio" class="text-sm text-emerald-400 hover:underline">Управлять портфелем</a>
      </div>
      <div id="top-holdings" class="space-y-3">
        <p class="text-slate-500 text-sm">Загрузка...</p>
      </div>
    </div>
  </main>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
