<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — AI Investor</title>
  <link rel="stylesheet" href="/static/css/theme.css?v=9">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="app-body auth-wrap">
  <div class="app-bg">
    <div class="app-bg-orb app-bg-orb-1"></div>
    <div class="app-bg-orb app-bg-orb-2"></div>
  </div>

  <div class="auth-card">
    <div class="text-center mb-8">
      <span id="auth-logo"></span>
      <h1 class="font-display text-2xl font-bold mt-6">С возвращением</h1>
      <p class="text-sm mt-2" style="color: var(--text-muted);">Войдите в свой инвестиционный кабинет</p>
    </div>

    <form id="login-form" class="glass-card glass-card-padded space-y-4">
      <div>
        <label class="form-label">Email</label>
        <input type="email" id="email" required class="input-field">
      </div>
      <div>
        <label class="form-label">Пароль</label>
        <input type="password" id="password" required class="input-field">
      </div>
      <p id="error" class="text-negative text-sm hidden"></p>
      <button type="submit" class="btn btn-primary w-full">Войти</button>
    </form>

    <p class="text-center text-sm mt-6" style="color: var(--text-muted);">
      Нет аккаунта? <a href="/register" class="link-accent">Зарегистрироваться</a>
    </p>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/layout.js?v=3"></script>
  <script>injectLogo("auth-logo", "/");</script>
  <script>
    redirectIfAuthed();
    const params = new URLSearchParams(window.location.search);
    const next = params.get("next") || "/dashboard";
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById("error");
      errorEl.classList.add("hidden");
      try {
        const data = await apiFetch("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
          }),
        });
        setToken(data.access_token);
        window.location.href = next;
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
