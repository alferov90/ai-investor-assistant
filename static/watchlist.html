<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchlist — AI Investor</title>
  <link rel="stylesheet" href="/static/css/theme.css?v=11">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="app-body">
  <div class="app-bg"><div class="app-bg-orb app-bg-orb-1"></div><div class="app-bg-orb app-bg-orb-2"></div></div>
  <div class="app-shell">
    <nav class="app-nav">
      <div class="app-nav-inner">
        <span id="app-logo"></span>
        <div id="main-nav" class="nav-links"></div>
      </div>
    </nav>
    <main class="app-main">
      <div class="page-header">
        <div>
          <h1 class="page-title">Watchlist</h1>
          <p class="page-subtitle">Идеи на радаре: причина, цена входа и событие для наблюдения</p>
        </div>
        <button id="btn-add" class="btn btn-primary btn-sm">+ Добавить</button>
      </div>
      <div id="list" class="space-y-3"><p style="color: var(--text-muted);">Загрузка...</p></div>
    </main>
  </div>
  <div id="modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50 px-4">
    <div class="glass-card glass-card-padded w-full max-w-md">
      <h2 class="font-display font-bold text-lg mb-4">Добавить в watchlist</h2>
      <form id="form" class="space-y-4">
        <input type="text" id="ticker" required placeholder="NVDA" class="input-field uppercase">
        <textarea id="notes" rows="3" placeholder="Например: купить ниже 120; жду отчет; риск — высокая оценка" class="input-field"></textarea>
        <p class="text-xs" style="color: var(--text-muted);">Пишите причину наблюдения и уровень, при котором идея станет интересной.</p>
        <p id="error" class="text-negative text-sm hidden"></p>
        <div class="flex gap-3">
          <button type="submit" class="btn btn-primary flex-1">Сохранить</button>
          <button type="button" id="cancel" class="btn btn-secondary flex-1">Отмена</button>
        </div>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/layout.js?v=3"></script>
  <script src="/static/js/charts.js?v=1"></script>
  <script src="/static/js/watchlist.js?v=2"></script>
  <script>injectLogo("app-logo"); renderNav("/watchlist");</script>
</body>
</html>
