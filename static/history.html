<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>История анализов — AI Investor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <nav class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="/dashboard" class="font-semibold text-lg"><span class="text-emerald-400">AI</span> Investor</a>
      <div id="main-nav" class="flex items-center gap-3 text-sm flex-wrap justify-end"></div>
    </div>
  </nav>
  <main class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-6">История AI-анализов</h1>
    <div class="flex gap-3 mb-6">
      <input type="text" id="filter" placeholder="Фильтр по тикеру (AAPL)" class="bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 uppercase">
      <button id="btn-filter" class="bg-emerald-500 text-white px-4 py-2 rounded-lg">Найти</button>
    </div>
    <div id="list" class="space-y-3"><p class="text-slate-500">Загрузка...</p></div>
    <div id="detail" class="hidden mt-8 bg-slate-900 border border-slate-800 rounded-xl p-6"></div>
  </main>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/layout.js"></script>
  <script src="/static/js/history.js"></script>
</body>
</html>
