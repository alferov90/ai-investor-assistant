<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — AI Investor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="/" class="font-semibold text-xl"><span class="text-emerald-400">AI</span> Investor</a>
      <h1 class="text-2xl font-bold mt-4">Создать аккаунт</h1>
    </div>

    <form id="register-form" class="bg-slate-900 border border-slate-800 rounded-2xl p-6 space-y-4">
      <div>
        <label class="block text-sm text-slate-400 mb-1">Имя</label>
        <input type="text" id="name" required minlength="1"
          class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-emerald-500">
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Email</label>
        <input type="email" id="email" required
          class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-emerald-500">
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Пароль (мин. 8 символов)</label>
        <input type="password" id="password" required minlength="8"
          class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-emerald-500">
      </div>
      <p id="error" class="text-red-400 text-sm hidden"></p>
      <button type="submit"
        class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-2.5 rounded-lg font-medium transition">
        Зарегистрироваться
      </button>
    </form>

    <p class="text-center text-slate-400 text-sm mt-6">
      Уже есть аккаунт? <a href="/login" class="text-emerald-400 hover:underline">Войти</a>
    </p>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    redirectIfAuthed();

    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById("error");
      errorEl.classList.add("hidden");

      try {
        const data = await apiFetch("/api/auth/register", {
          method: "POST",
          body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
          }),
        });
        setToken(data.access_token);
        window.location.href = "/dashboard";
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
