<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Портфель — AI Investor</title>
  <link rel="stylesheet" href="/static/css/theme.css?v=9">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="app-body">
  <div class="app-bg"><div class="app-bg-orb app-bg-orb-1"></div><div class="app-bg-orb app-bg-orb-2"></div></div>
  <div class="app-shell">
    <nav class="app-nav">
      <div class="app-nav-inner">
        <span id="app-logo"></span>
        <div id="main-nav" class="nav-links"></div>
      </div>
    </nav>
    <main class="app-main">
      <div class="page-header">
        <div>
          <h1 class="page-title">Портфель</h1>
          <a href="/transactions" class="link-accent text-sm">Журнал сделок →</a>
        </div>
        <button id="btn-add" class="btn btn-primary btn-sm">+ Добавить тикер</button>
      </div>
      <div id="holdings-list" class="space-y-3"><p style="color: var(--text-muted);">Загрузка...</p></div>
    </main>
  </div>
  <div id="modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50 px-4">
    <div class="glass-card glass-card-padded w-full max-w-md">
      <h2 id="modal-title" class="font-display font-bold text-lg mb-4">Добавить тикер</h2>
      <form id="holding-form" class="space-y-4">
        <input type="hidden" id="holding-id">
        <div>
          <label class="form-label">Тикер</label>
          <input type="text" id="ticker" required placeholder="AAPL" class="input-field uppercase">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="form-label">Кол-во акций</label>
            <input type="number" id="shares" required min="0.000001" step="any" class="input-field">
          </div>
          <div>
            <label class="form-label">Средняя цена</label>
            <input type="number" id="avg_price" required min="0" step="any" class="input-field">
          </div>
        </div>
        <div>
          <label class="form-label">Заметки</label>
          <textarea id="notes" rows="2" class="input-field"></textarea>
        </div>
        <p id="form-error" class="text-negative text-sm hidden"></p>
        <div class="flex gap-3">
          <button type="submit" class="btn btn-primary flex-1">Сохранить</button>
          <button type="button" id="btn-cancel" class="btn btn-secondary flex-1">Отмена</button>
        </div>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/layout.js?v=3"></script>
  <script src="/static/js/charts.js?v=1"></script>
  <script src="/static/js/portfolio.js"></script>
  <script>injectLogo("app-logo"); renderNav("/portfolio");</script>
</body>
</html>
