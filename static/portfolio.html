<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Портфель — AI Investor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <nav class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="/dashboard" class="font-semibold text-lg"><span class="text-emerald-400">AI</span> Investor</a>
      <div id="main-nav" class="flex items-center gap-3 text-sm flex-wrap justify-end"></div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
      <h1 class="text-2xl font-bold">Портфель</h1>
      <button id="btn-add" class="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2.5 rounded-lg text-sm font-medium transition">
        + Добавить тикер
      </button>
    </div>

    <div id="holdings-list" class="space-y-3">
      <p class="text-slate-500">Загрузка...</p>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 px-4">
    <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-md p-6">
      <h2 id="modal-title" class="text-lg font-semibold mb-4">Добавить тикер</h2>
      <form id="holding-form" class="space-y-4">
        <input type="hidden" id="holding-id">
        <div>
          <label class="block text-sm text-slate-400 mb-1">Тикер</label>
          <input type="text" id="ticker" required placeholder="AAPL"
            class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 uppercase focus:outline-none focus:border-emerald-500">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-slate-400 mb-1">Кол-во акций</label>
            <input type="number" id="shares" required min="0.000001" step="any"
              class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-emerald-500">
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">Средняя цена</label>
            <input type="number" id="avg_price" required min="0" step="any"
              class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-emerald-500">
          </div>
        </div>
        <div>
          <label class="block text-sm text-slate-400 mb-1">Заметки</label>
          <textarea id="notes" rows="2"
            class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-emerald-500"></textarea>
        </div>
        <p id="form-error" class="text-red-400 text-sm hidden"></p>
        <div class="flex gap-3">
          <button type="submit" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white py-2.5 rounded-lg font-medium">Сохранить</button>
          <button type="button" id="btn-cancel" class="flex-1 border border-slate-700 py-2.5 rounded-lg">Отмена</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/layout.js"></script>
  <script src="/static/js/portfolio.js"></script>
</body>
</html>
