<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Алерты — AI Investor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <nav class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="/dashboard" class="font-semibold text-lg"><span class="text-emerald-400">AI</span> Investor</a>
      <div id="main-nav" class="flex items-center gap-3 text-sm flex-wrap justify-end"></div>
    </div>
  </nav>
  <main class="max-w-6xl mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">Price Alerts</h1>
      <button id="btn-add" class="bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm">+ Алерт</button>
    </div>
    <p class="text-slate-400 text-sm mb-6">Уведомления в Telegram (нужно подключить бота в Dashboard).</p>
    <div id="list" class="space-y-3"><p class="text-slate-500">Загрузка...</p></div>
  </main>
  <div id="modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 px-4">
    <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-md p-6">
      <h2 class="text-lg font-semibold mb-4">Новый алерт</h2>
      <form id="form" class="space-y-4">
        <input type="text" id="ticker" required placeholder="AAPL" class="w-full uppercase bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5">
        <select id="condition" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5">
          <option value="above">Цена выше</option>
          <option value="below">Цена ниже</option>
          <option value="change_up">Рост за день ≥ %</option>
          <option value="change_down">Падение за день ≥ %</option>
        </select>
        <input type="number" id="target" required step="any" min="0.01" placeholder="150 или 5 (для %)" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5">
        <p id="error" class="text-red-400 text-sm hidden"></p>
        <div class="flex gap-3">
          <button type="submit" class="flex-1 bg-emerald-500 text-white py-2.5 rounded-lg">Создать</button>
          <button type="button" id="cancel" class="flex-1 border border-slate-700 py-2.5 rounded-lg">Отмена</button>
        </div>
      </form>
    </div>
  </div>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/layout.js"></script>
  <script src="/static/js/alerts.js"></script>
</body>
</html>
