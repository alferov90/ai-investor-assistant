<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Алерты — AI Investor</title>
  <link rel="stylesheet" href="/static/css/theme.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="app-body">
  <div class="app-bg"><div class="app-bg-orb app-bg-orb-1"></div><div class="app-bg-orb app-bg-orb-2"></div></div>
  <div class="app-shell">
    <nav class="app-nav">
      <div class="app-nav-inner">
        <span id="app-logo"></span>
        <div id="main-nav" class="nav-links"></div>
      </div>
    </nav>
    <main class="app-main">
      <div class="page-header">
        <div>
          <h1 class="page-title">Price Alerts</h1>
          <p class="page-subtitle">Уведомления в Telegram · /alert в боте</p>
        </div>
        <button id="btn-add" class="btn btn-primary btn-sm">+ Алерт</button>
      </div>
      <div id="list" class="space-y-3"><p style="color: var(--text-muted);">Загрузка...</p></div>
    </main>
  </div>
  <div id="modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50 px-4">
    <div class="glass-card glass-card-padded w-full max-w-md">
      <h2 class="font-display font-bold text-lg mb-4">Новый алерт</h2>
      <form id="form" class="space-y-4">
        <input type="text" id="ticker" required placeholder="AAPL" class="input-field uppercase">
        <select id="condition" class="input-field">
          <option value="above">Цена выше</option>
          <option value="below">Цена ниже</option>
          <option value="change_up">Рост за день ≥ %</option>
          <option value="change_down">Падение за день ≥ %</option>
        </select>
        <input type="number" id="target" required step="any" min="0.01" placeholder="150 или 5 (для %)" class="input-field">
        <p id="error" class="text-negative text-sm hidden"></p>
        <div class="flex gap-3">
          <button type="submit" class="btn btn-primary flex-1">Создать</button>
          <button type="button" id="cancel" class="btn btn-secondary flex-1">Отмена</button>
        </div>
      </form>
    </div>
  </div>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/layout.js"></script>
  <script src="/static/js/alerts.js"></script>
  <script>injectLogo("app-logo"); renderNav("/alerts");</script>
</body>
</html>
