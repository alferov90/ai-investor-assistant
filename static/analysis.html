<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Анализ акций — AI Investor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <nav class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="/dashboard" class="font-semibold text-lg"><span class="text-emerald-400">AI</span> Investor</a>
      <div id="main-nav" class="flex items-center gap-3 text-sm flex-wrap justify-end"></div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-6">AI-анализ акций</h1>

    <form id="search-form" class="flex gap-3 mb-8">
      <input type="text" id="ticker" required placeholder="Введите тикер (AAPL, MSFT, TSLA...)"
        class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 uppercase focus:outline-none focus:border-emerald-500">
      <button type="submit"
        class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2.5 rounded-lg font-medium transition">
        Анализировать
      </button>
    </form>

    <p id="error" class="text-red-400 text-sm mb-4 hidden"></p>
    <p id="login-hint" class="text-amber-400 text-sm mb-4 hidden">
      <a href="/login" class="underline">Войти</a> или
      <a href="/register" class="underline">зарегистрироваться</a>
    </p>
    <div id="loading" class="hidden text-slate-400 text-sm mb-4">Загрузка...</div>

    <div id="result" class="hidden space-y-6">
      <div class="bg-slate-900 border border-slate-800 rounded-xl p-6">
        <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-4">
          <div>
            <h2 id="stock-name" class="text-xl font-bold"></h2>
            <p id="stock-ticker" class="text-slate-400"></p>
          </div>
          <div class="text-right">
            <p id="stock-price" class="text-3xl font-bold"></p>
            <div class="flex items-center justify-end gap-2 mt-2">
              <span class="text-slate-400 text-sm">Рейтинг</span>
              <span id="rating" class="text-2xl font-bold text-emerald-400">—</span>
              <span class="text-slate-500 text-sm">/10</span>
            </div>
          </div>
        </div>
        <div id="stock-meta" class="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-6 text-sm"></div>
      </div>

      <div id="analysis-section" class="hidden space-y-6">
      <div class="grid md:grid-cols-3 gap-6">
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-6">
          <h3 class="font-semibold text-lg mb-3 text-emerald-400">Сильные стороны</h3>
          <ul id="strengths" class="space-y-2 text-sm text-slate-300"></ul>
        </div>
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-6">
          <h3 class="font-semibold text-lg mb-3 text-amber-400">Слабые стороны</h3>
          <ul id="weaknesses" class="space-y-2 text-sm text-slate-300"></ul>
        </div>
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-6">
          <h3 class="font-semibold text-lg mb-3 text-red-400">Риски</h3>
          <ul id="risks" class="space-y-2 text-sm text-slate-300"></ul>
        </div>
      </div>

      <div class="bg-slate-900 border border-emerald-800/50 rounded-xl p-6">
        <div class="flex items-center gap-2 mb-3">
          <h3 class="font-semibold text-lg">Инвестиционный вывод</h3>
          <span id="ai-badge" class="text-xs bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full">GPT</span>
        </div>
        <p id="investment-conclusion" class="text-slate-300 leading-relaxed"></p>
      </div>
      </div>
    </div>
  </main>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/layout.js"></script>
  <script src="/static/js/analysis.js"></script>
</body>
</html>
